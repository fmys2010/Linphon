name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PSIPHON_MG_GO_INTEGRATION: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tools/psiphon-mg/go.mod

      - name: Run Go tests
        working-directory: tools/psiphon-mg
        run: go test ./...
